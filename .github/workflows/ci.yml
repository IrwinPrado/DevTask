name: DevTask CI/CD

# Se ejecuta automáticamente en cada push o pull request a main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Generate APK
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Da permisos de ejecución a Gradle
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Decodifica y coloca el google-services.json desde los secretos
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > encoded.txt
          certutil -decode encoded.txt app/google-services.json

      # 4. Corre las pruebas unitarias y genera reporte
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # 5. Sube el reporte de pruebas como evidencia
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always() # sube el reporte aunque las pruebas fallen
        with:
          name: test-report
          path: app/build/reports/tests/

      # 6. Compila el APK de debug
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 7. Sube el APK como artefacto descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevTask-debug
          path: app/build/outputs/apk/debug/app-debug.apk